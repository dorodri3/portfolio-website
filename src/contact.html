<!DOCTYPE html>
<html class="page-transition" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact ⋅ Darrell Rodriguez</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header"></div>

    <main>
        <section class="section reveal">
            <div class="section-inner">
                <h2>Contact</h2>
                <p>If you'd like to collaborate or learn more about my process, send a message and I'll reply soon.</p>

                <div class="contact-info">
                    <p><strong>Email:</strong> <a href="mailto:dorodri3@asu.edu">dorodri3@asu.edu</a></p>
                    <p><strong>Phone:</strong> <a href="tel:+17027381839">(702) 738‑1839</a></p>
                </div>

                <form class="contact-form" action="#" method="post" onsubmit="alert('Thanks for reaching out! I will get back to you soon.'); return false;">
                    <label>
                        Name
                        <input type="text" name="name" placeholder="Your name" required>
                    </label>
                    <label>
                        Email
                        <input type="email" name="email" placeholder="you@example.com" required>
                    </label>
                    <label>
                        Message
                        <textarea name="message" rows="4" placeholder="What would you like to build together?" required></textarea>
                    </label>
                    <button class="button" type="submit">Send message</button>
                </form>
            </div>
        </section>
    </main>

    <div id="footer"></div>
    <script src="js/main.js"></script>
</body>
</html>
